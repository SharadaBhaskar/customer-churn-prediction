<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — ChurnPredict</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">ChurnPredict</div>
    <div class="auth-tagline">AI-Powered Customer Intelligence</div>

    <h2 class="auth-title">Welcome Back 👋</h2>
    <p class="auth-sub">Login to your account to continue</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'danger' if cat=='error' else cat }}">
          <i class="fas fa-{{ 'exclamation-circle' if cat=='danger' else 'check-circle' }}"></i> {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login" id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address <span class="req">*</span></label>
        <div style="position:relative">
          <i class="fas fa-envelope" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--txt-3);font-size:.85rem"></i>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" style="padding-left:2.5rem" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span class="req">*</span></label>
        <div style="position:relative">
          <i class="fas fa-lock" style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--txt-3);font-size:.85rem"></i>
          <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" style="padding-left:2.5rem;padding-right:2.75rem" required>
          <button type="button" onclick="togglePwd('password','eye-icon')" style="position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt-3);cursor:pointer;padding:0">
            <i class="fas fa-eye" id="eye-icon" style="font-size:.9rem"></i>
          </button>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
        <label class="form-check">
          <input type="checkbox" name="remember"> <span class="form-check-label">Remember me</span>
        </label>
        <a href="/forgot-password" style="font-size:.85rem;color:var(--brand);font-weight:600">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-grad w-full btn-lg">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <hr class="divider">
    <p style="text-align:center;font-size:.875rem;color:var(--txt-3)">
      Don't have an account? <a href="/register" style="color:var(--brand);font-weight:700">Register</a>
    </p>
  </div>
</div>

<script>
function togglePwd(id,iconId){
  const f=document.getElementById(id);
  const i=document.getElementById(iconId);
  if(f.type==='password'){f.type='text';i.className='fas fa-eye-slash'}
  else{f.type='password';i.className='fas fa-eye'}
}
</script>
</body>
</html>
