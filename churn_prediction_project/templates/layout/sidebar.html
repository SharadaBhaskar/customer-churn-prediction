<!-- templates/layout/sidebar.html -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo-area">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">📊</div>
      Churn
    </div>
    <div class="sidebar-tagline">AI-Powered Analytics</div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="/dashboard" class="nav-item" id="nav-dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="/customers" class="nav-item" id="nav-customers"><i class="fas fa-users"></i> Customers</a>

    <div class="nav-section-label">Prediction</div>
    <a href="/predict" class="nav-item" id="nav-predict"><i class="fas fa-robot"></i> Churn Prediction</a>
    <a href="/segmentation" class="nav-item" id="nav-segmentation"><i class="fas fa-layer-group"></i> Segmentation</a>
    <a href="/retention" class="nav-item" id="nav-retention"><i class="fas fa-shield-alt"></i> Retention</a>

    <div class="nav-section-label">Marketing</div>
    <a href="/campaigns" class="nav-item" id="nav-campaigns"><i class="fas fa-bullhorn"></i> Campaigns</a>
    <a href="/sms-alert" class="nav-item" id="nav-sms"><i class="fas fa-sms"></i> SMS Alerts</a>

    <div class="nav-section-label">Insights</div>
    <a href="/analytics" class="nav-item" id="nav-analytics"><i class="fas fa-chart-line"></i> Analytics</a>
    <a href="/reports" class="nav-item" id="nav-reports"><i class="fas fa-file-alt"></i> Reports</a>
    <a href="/feedback" class="nav-item" id="nav-feedback"><i class="fas fa-star"></i> Feedback</a>

    {% if current_user and current_user['role'] == 'Admin' %}
    <a href="/admin/users" class="nav-item" id="nav-users">
      <i class="fas fa-users-cog"></i> Manage Users
    </a>
    {% endif %}

  </nav>

  <div class="sidebar-footer">
    <a href="/profile" class="sidebar-footer-item" id="nav-profile"><i class="fas fa-user-circle"></i> Profile</a>
    <a href="/settings" class="sidebar-footer-item" id="nav-settings"><i class="fas fa-cog"></i> Settings</a>
    <a href="/logout" class="sidebar-footer-item" style="color:#F87171"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>
</aside>

<script>
(function(){
  const map = {
    '/dashboard':'nav-dashboard','/customers':'nav-customers',
    '/predict':'nav-predict','/segmentation':'nav-segmentation',
    '/retention':'nav-retention','/campaigns':'nav-campaigns',
    '/sms-alert':'nav-sms','/analytics':'nav-analytics',
    '/reports':'nav-reports','/feedback':'nav-feedback',
    '/profile':'nav-profile','/settings':'nav-settings',
    '/admin/users':'nav-users'
  };
  const path = window.location.pathname;
  for(const [route, id] of Object.entries(map)){
    if(path.startsWith(route)){
      const el = document.getElementById(id);
      if(el) el.classList.add('active');
    }
  }
})();
</script>
